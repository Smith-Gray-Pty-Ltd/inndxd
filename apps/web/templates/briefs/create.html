{% extends "base.html" %}
{% block title %}Create Brief — Inndxd{% endblock %}
{% block page_title %}Create Brief{% endblock %}
{% block content %}
<div class="max-w-2xl bg-white rounded-lg shadow p-8">
    {% if error %}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/ui/briefs/create" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Project *</label>
            <select name="project_id" required
                    class="mt-1 block w-full border rounded p-2 focus:ring-blue-500 focus:border-blue-500">
                <option value="">Select a project...</option>
                {% for project in projects %}
                <option value="{{ project.id }}" {% if selected_project_id == project.id|string %}selected{% endif %}>
                    {{ project.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Natural Language Query *</label>
            <textarea name="natural_language" rows="5" required minlength="10"
                      placeholder="Describe what you want to research..."
                      class="mt-1 block w-full border rounded p-2 focus:ring-blue-500 focus:border-blue-500">{{ natural_language or "" }}</textarea>
            <p class="text-xs text-gray-400 mt-1">Minimum 10 characters. Be specific about what data you need.</p>
        </div>
        <div class="flex space-x-4">
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Create & Run</button>
            <a href="/ui/projects" class="px-4 py-2 border rounded text-gray-600 hover:bg-gray-50">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
