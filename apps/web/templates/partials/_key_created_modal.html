<div class="mt-4 p-4 bg-green-50 border border-green-200 rounded">
    <p class="text-green-800 font-medium mb-2">Key Created: {{ key_name }}</p>
    <p class="text-sm text-gray-600 mb-2">Prefix: <code class="bg-gray-100 px-1 rounded">{{ key_prefix }}</code></p>
    <div class="flex items-center space-x-2 mb-2">
        <input type="text" id="raw-key-{{ key_id }}" value="{{ raw_key }}" readonly
               class="flex-1 text-xs font-mono border rounded p-2 bg-white">
        <button onclick="navigator.clipboard.writeText(document.getElementById('raw-key-{{ key_id }}').value)"
                class="px-3 py-1 bg-gray-600 text-white text-xs rounded hover:bg-gray-700">Copy</button>
    </div>
    <p class="text-xs text-red-600">Save this key now. It will not be shown again.</p>
</div>
