{% extends "base.html" %}
{% block title %}Login — Inndxd{% endblock %}
{% block page_title %}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20">
    <h1 class="text-3xl font-bold text-center mb-2">Inndxd</h1>
    <p class="text-center text-gray-500 mb-8">Sign in to your account</p>
    <div class="bg-white rounded-lg shadow p-8">
        {% if error %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded text-sm">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/ui/auth/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required
                       class="block w-full rounded border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 p-2 border">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="block w-full rounded border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 p-2 border">
            </div>
            <button type="submit"
                    class="w-full py-2 px-4 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium">
                Sign In
            </button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-500">
            No account? <a href="/ui/auth/register" class="text-blue-600 hover:underline">Register</a>
        </p>
    </div>
</div>
{% endblock %}
