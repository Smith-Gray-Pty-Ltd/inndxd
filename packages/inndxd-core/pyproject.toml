[project]
name = "inndxd-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10,<3",
    "sqlalchemy[asyncio]>=2.0.36,<3",
    "asyncpg>=0.30,<1",
    "alembic>=1.14,<2",
    "pgvector>=0.3,<1",
    "pyjwt[crypto]>=2.9,<3",
    "passlib[bcrypt]>=1.7,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/inndxd_core"]
